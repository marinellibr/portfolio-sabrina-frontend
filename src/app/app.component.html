<div class="page-wrapper" [class.dark-mode]="isDarkMode">
  <header class="header">
    <div class="logo">
      <span class="logo-star">✳</span>
      <span class="logo-name">Sabrina<br>Cardoso</span>
    </div>
    <nav class="nav">
      <a href="#" class="nav-link">{{ 'NAV.PROJECTS' | translate }}</a>
      <span class="nav-sep">+</span>
      <a href="#" class="nav-link">{{ 'NAV.ABOUT' | translate }}</a>
      <span class="nav-sep">+</span>
      <a href="#" class="nav-link">{{ 'NAV.CONTACT' | translate }}</a>

      <button class="lang-toggle" (click)="lang.toggle()" aria-label="Toggle language">
        {{ lang.current === 'pt' ? 'EN' : 'PT' }}
      </button>

      <button class="theme-toggle" (click)="toggleDarkMode()" [attr.aria-label]="isDarkMode ? 'Ativar modo claro' : 'Ativar modo escuro'">
        @if (!isDarkMode) {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        }
      </button>
    </nav>
  </header>

  <router-outlet />

  <div class="deco deco-1" aria-hidden="true">✳</div>
  <div class="deco deco-2" aria-hidden="true">✦</div>
  <div class="deco deco-3" aria-hidden="true">✳</div>

  <footer class="footer">
    <p>{{ 'FOOTER.COPYRIGHT' | translate }}</p>
  </footer>
</div>
