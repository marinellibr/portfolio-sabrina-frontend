<div class="login-page">
  <div class="login-card">
    <h1>Login</h1>
    <p class="subtitle">Painel administrativo</p>

    <div *ngIf="error()" class="alert">
      {{ error() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="username">Usuário</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="seu usuário"
          autocomplete="username"
          [class.invalid]="username?.invalid && username?.touched"
        />
        <span *ngIf="username?.invalid && username?.touched" class="field-error">
          Usuário obrigatório (mínimo 3 caracteres)
        </span>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="sua senha"
          autocomplete="current-password"
          [class.invalid]="password?.invalid && password?.touched"
        />
        <span *ngIf="password?.invalid && password?.touched" class="field-error">
          Senha obrigatória (mínimo 6 caracteres)
        </span>
      </div>

      <button type="submit" [disabled]="form.invalid || loading()" class="btn-primary">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
