<div class="login-container">
  <div class="login-card">
    <h1>Login - Painel Admin</h1>

    <div *ngIf="error()" class="error-message">
      {{ error() }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="seu_usuario"
          [class.invalid]="username?.invalid && username?.touched"
        />
        <span *ngIf="username?.invalid && username?.touched" class="error-text">
          Usuário obrigatório (mínimo 3 caracteres)
        </span>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Sua senha"
          [class.invalid]="password?.invalid && password?.touched"
        />
        <span *ngIf="password?.invalid && password?.touched" class="error-text">
          Senha obrigatória (mínimo 6 caracteres)
        </span>
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="btn-submit"
      >
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
