name: Testes com Autenticação

on:
  push:
    branches: [main, develop, claude/**]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      API_URL: https://portfolio-sabrina-backend.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: |
          if find src -name '*.spec.ts' | grep -q .; then
            npm test -- --watch=false --browsers=ChromeHeadless
          else
            echo "Nenhum arquivo .spec.ts encontrado, pulando testes."
          fi

      - name: Build project
        run: npm run build

      - name: Verify environment variables loaded
        run: |
          echo "✓ ADMIN_USERNAME configurado: ${ADMIN_USERNAME:0:3}***"
          echo "✓ API_URL: $API_URL"
